version: 2
updates:
  # 1. Hält deine GitHub Actions aktuell (wichtig für die Automatisierung)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      action-updates:
        patterns:
          - "*"

  # 2. Hält Python-Bibliotheken wie 'requests' aktuell
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"
