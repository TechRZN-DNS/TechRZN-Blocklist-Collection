version: 2
updates:
  # 1. GitHub Actions bleiben drin
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # 2. Python/Pip Check - NUR wenn du eine requirements.txt hast
  - package-ecosystem: "pip"
    directory: "/" # Falls deine requirements.txt in einem Ordner ist, hier ändern (z.B. "/scripts")
    schedule:
      interval: "weekly"
    # Diese Option hilft, wenn er zu viele PRs für falsche Treffer erstellt
    open-pull-requests-limit: 3
