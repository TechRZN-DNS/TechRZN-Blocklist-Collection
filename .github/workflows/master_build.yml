name: "🚀 TechRZN Master Build"

on:
  push:
    branches:
      - main
    paths:
      - 'sources/**'
      - 'scripts/**'
      - 'manual_sources/**'
      - '.github/workflows/**'
  
  schedule:
    # Läuft jeden Tag um 04:00 Uhr UTC
    - cron: '0 4 * * *'
  
  workflow_dispatch:

# --- HIER IST DER FIX FÜR DIE GELBE WARNUNG ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛰️ Repository auschecken
        uses: actions/checkout@v4
        with:
          ref: main           # FIX: Erzwingt den main-Branch
          fetch-depth: 0      # FIX: Verhindert detached HEAD

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Abhängigkeiten installieren
        run: pip install requests

      - name: 🛠️ Master-Liste bauen
        run: python scripts/build.py

      - name: 💾 Änderungen speichern (Commit & Push)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main        # FIX: Ziel-Branch explizit angeben
          commit_message: "build: Filter-Listen v1.2.0 aktualisiert [bot]"
          file_pattern: 'blocklists/*.txt Whitelists/*.txt'
          push_options: '--force'
