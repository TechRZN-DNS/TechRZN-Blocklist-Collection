name: "🚀 TechRZN Master Build"

on:
  push:
    paths:
      - 'sources/**'
      - 'scripts/**'
      - 'manual_sources/**'
      - '.github/workflows/**'
  
  # --- TÄGLICHES AUTOMATISCHES UPDATE ---
  schedule:
    # Läuft jeden Tag um 04:00 Uhr UTC (ca. 05:00/06:00 Uhr in Kleve)
    - cron: '0 4 * * *'
  
  # Erlaubt das manuelle Starten per Button
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛰️ Repository auschecken
        uses: actions/checkout@v6

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 📦 Abhängigkeiten installieren
        run: pip install requests

      - name: 🛠️ Master-Liste bauen
        run: python scripts/build.py

      - name: 💾 Änderungen speichern (Commit & Push)
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "build: Filter-Listen und Whitelist aktualisiert [bot]"
          # Speichert die Ergebnisse aus beiden relevanten Ordnern
          file_pattern: 'blocklists/*.txt Whitelists/*.txt'
          push_options: '--force'
