name: "🚀 TechRZN Master Build"

on:
  push:
    paths:
      # Wir triggern NUR, wenn du Quellen oder das Skript änderst
      - 'sources/**'
      - 'scripts/**'
      - '.github/workflows/**'
  # Erlaubt das manuelle Starten per Button (sehr wichtig zum Testen!)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛰️ Repository auschecken
        uses: actions/checkout@v4 # V4 ist der aktuelle stabile Standard

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Abhängigkeiten installieren
        run: pip install requests

      - name: 🛠️ Master-Liste bauen
        run: python scripts/build.py

      - name: 💾 Änderungen speichern (Commit & Push)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: Filter-Listen und Whitelist aktualisiert [bot]"
          # Hier werden die Ergebnisse aus beiden Ordnern gespeichert
          file_pattern: 'blocklists/*.txt Whitelists/*.txt'
          # Force-Push ist hier gut, um den Verlauf sauber zu halten
          push_options: '--force'
