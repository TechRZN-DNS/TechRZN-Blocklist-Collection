name: "🚀 TechRZN Master Build"

on:
  push:
    paths:
      - 'blocklists/**'
      - 'sources/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛰️ Repository auschecken
        uses: actions/checkout@v6

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Abhängigkeiten installieren
        run: pip install requests

      - name: 🛠️ Master-Liste bauen
        run: |
          python scripts/build.py

      - name: 💾 Änderungen speichern (Commit & Push)
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "build: Einzel-Kategorien aktualisiert [bot]"
          # Hier wird jetzt gezielt nur der Ordner mit den Einzellisten gespeichert
          file_pattern: 'blocklists/*.txt whitelist.txt'
          # Force-Push, um die alten kombinierten Dateireste sauber zu überschreiben
          push_options: '--force'
