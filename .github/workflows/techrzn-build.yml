name: "TechRZN - Master Build"

on:
  push:
    paths:
      - 'allowlist.raw'
      - 'sources/**'      # WICHTIG: Er erkennt jetzt alle 13 Dateien im Ordner
      - 'scripts/**'      # Erkennt Änderungen am Python-Code
  workflow_dispatch:      # Erlaubt dir, den Build manuell zu starten

jobs:
  build-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run TechRZN Build Script
        run: python scripts/build.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: TechRZN Filter-Listen automatisch aktualisiert [bot]"
          file_pattern: 'techrzn_*.txt whitelist.txt'
