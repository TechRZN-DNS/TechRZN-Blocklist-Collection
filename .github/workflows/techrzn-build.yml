name: "TechRZN - Filter Hub Build"

on:
  push:
    paths:
      - 'allowlist.raw'
      - 'sources/**'      # Überwacht deine 13 Quell-Dateien
      - 'scripts/**'      # Überwacht Änderungen am Python-Skript
  workflow_dispatch:      # Ermöglicht dir den manuellen Start über den "Actions" Tab

jobs:
  build-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Wichtig, damit der Bot Dateien speichern darf
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run TechRZN Build Script
        run: python scripts/build.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "build: TechRZN Filter-Listen automatisch aktualisiert [bot]"
          file_pattern: 'blocklists/*.txt whitelist.txt' # Speichert alles im neuen Ordner
