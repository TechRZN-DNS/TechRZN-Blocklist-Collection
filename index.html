<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TechRZN | DNS Filter-Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117; /* GitHub Dark Background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
            background-color: #0d1117;
        }
        @media (max-width: 767px) {
            .markdown-body { padding: 15px; }
        }
        /* Fix für zentrierte Elemente in deiner README */
        .markdown-body div[align="center"] {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        img { max-width: 100%; }
    </style>
</head>
<body>

<article class="markdown-body" id="content">
    <p style="text-align: center; margin-top: 50px;">🚀 Lade TechRZN Dashboard...</p>
</article>

<script>
    // Holt sich den Inhalt deiner README direkt vom Server
    fetch('https://raw.githubusercontent.com/TechRZN-DNS/TechRZN-Blocklist-Collection/main/README.md')
        .then(response => response.text())
        .then(text => {
            // Ein einfacher Markdown-Parser für den Browser
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
            document.head.appendChild(script);
            
            script.onload = () => {
                document.getElementById('content').innerHTML = marked.parse(text);
            };
        });
</script>

</body>
</html>
